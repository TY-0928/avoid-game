<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>避けゲーム</title>
<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
}
canvas {
    display: block;
    margin: auto;
    background: black;
}
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
const WIDTH = 800;
const HEIGHT = 800;
const PLAYER_SIZE = 30;
const PLAYER_SPEED = 10;

let canvas = document.getElementById("gameCanvas");
let ctx = canvas.getContext("2d");
canvas.width = WIDTH;
canvas.height = HEIGHT;

let player = {
    x: WIDTH/2 - PLAYER_SIZE/2,
    y: HEIGHT - 60,
    size: PLAYER_SIZE
};

let enemies = [];
let score = 0;
let enemyBaseSpeed = 5;
let enemySpawnInterval = 1000;
let gameRunning = true;

let highScore = localStorage.getItem("highScore") 
    ? parseInt(localStorage.getItem("highScore")) 
    : 0;

let keys = {};

document.addEventListener("keydown", e => {
    keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup", e => {
    keys[e.key.toLowerCase()] = false;
});

function updatePlayer() {
    if (keys["arrowleft"] || keys["a"]) player.x -= PLAYER_SPEED;
    if (keys["arrowright"] || keys["d"]) player.x += PLAYER_SPEED;
    if (keys["arrowup"] || keys["w"]) player.y -= PLAYER_SPEED;
    if (keys["arrowdown"] || keys["s"]) player.y += PLAYER_SPEED;

    player.x = Math.max(0, Math.min(WIDTH - player.size, player.x));
    player.y = Math.max(0, Math.min(HEIGHT - player.size, player.y));
}

function createEnemy() {
    if (!gameRunning) return;

    let x = Math.random() * (WIDTH - 30);
    let speed = Math.floor(Math.random() * 4) + enemyBaseSpeed - 2;
    if (speed < 1) speed = 1;

    enemies.push({
        x: x,
        y: 0,
        size: 30,
        speed: speed
    });

    setTimeout(createEnemy, enemySpawnInterval);
}

function updateEnemies() {
    for (let i = enemies.length - 1; i >= 0; i--) {
        let e = enemies[i];
        e.y += e.speed;

        if (checkCollision(player, e)) {
            gameOver();
        }

        if (e.y > HEIGHT) {
            enemies.splice(i, 1);
        }
    }
}

function checkCollision(a, b) {
    return !(
        a.x + a.size < b.x ||
        a.x > b.x + b.size ||
        a.y + a.size < b.y ||
        a.y > b.y + b.size
    );
}

function updateScore() {
    if (!gameRunning) return;

    score++;

    if (score % 10 === 0) {
        enemyBaseSpeed++;
        if (enemySpawnInterval > 200) {
            enemySpawnInterval -= 100;
        }
    }

    setTimeout(updateScore, 1000);
}

function draw() {
    ctx.clearRect(0, 0, WIDTH, HEIGHT);

    // player
    ctx.fillStyle = "cyan";
    ctx.fillRect(player.x, player.y, player.size, player.size);

    // enemies
    ctx.fillStyle = "red";
    enemies.forEach(e => {
        ctx.fillRect(e.x, e.y, e.size, e.size);
    });

    // score
    ctx.fillStyle = "white";
    ctx.font = "20px Arial";
    ctx.fillText("Score: " + score, WIDTH/2 - 50, 30);

    ctx.fillStyle = "yellow";
    ctx.fillText("High Score: " + highScore, WIDTH/2 - 60, 60);

    if (!gameRunning) {
        ctx.fillStyle = "white";
        ctx.font = "40px Arial";
        ctx.fillText("GAME OVER", WIDTH/2 - 120, HEIGHT/2);

        ctx.font = "20px Arial";
        ctx.fillText("Press R to Restart", WIDTH/2 - 100, HEIGHT/2 + 40);
    }
}

function gameLoop() {
    if (gameRunning) {
        updatePlayer();
        updateEnemies();
    }
    draw();
    requestAnimationFrame(gameLoop);
}

function gameOver() {
    gameRunning = false;

    if (score > highScore) {
        highScore = score;
        localStorage.setItem("highScore", highScore);
    }
}

document.addEventListener("keydown", e => {
    if (e.key.toLowerCase() === "r" && !gameRunning) {
        restartGame();
    }
});

function restartGame() {
    enemies = [];
    score = 0;
    enemyBaseSpeed = 5;
    enemySpawnInterval = 1000;
    player.x = WIDTH/2 - PLAYER_SIZE/2;
    player.y = HEIGHT - 60;
    gameRunning = true;
    createEnemy();
    updateScore();
}

createEnemy();
updateScore();
gameLoop();
</script>

</body>
</html>
